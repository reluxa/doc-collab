name: Tests

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare test directories
        run: mkdir -p documents

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests (no-server)
        run: npx vitest run --exclude "tests/api-documents.test.ts" --exclude "tests/api-write-echo.test.ts"

      - name: Build
        run: npm run build

      # Dev server (Turbopack or Webpack) crashes under Cypress load with this
      # project's Yjs/Hocuspocus dependency graph. Use production build instead.
      # Collaboration tests (caret-stability, collaboration, mcp-browser-sync)
      # require the Hocuspocus server and are skipped in CI for now.
      - name: Start production server
        run: npx next start -p 3000 &
        env:
          PORT: 3000

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q 200; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done
          curl -sf http://localhost:3000 || exit 1

      - name: API integration tests
        run: npx vitest run "tests/api-documents.test.ts" "tests/api-write-echo.test.ts"

      - name: Install Cypress binaries
        run: npx cypress install

      - name: E2E tests (editor only)
        run: npx cypress run --spec "cypress/e2e/editor.cy.ts"
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: Stop server
        if: always()
        run: pkill -f "next-server" || true
