name: Tests

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare test directories
        run: mkdir -p documents

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests (no-server)
        run: npx vitest run --exclude "tests/api-documents.test.ts" --exclude "tests/api-write-echo.test.ts"

      - name: Build
        run: npm run build

      # Custom server (Turbopack + Hocuspocus + WS). Fresh .next avoids mixing
      # production build artifacts with dev compilation.
      - name: Start dev server
        run: |
          pkill -f "tsx.*server.ts" || true
          pkill -f next-server || true
          rm -rf .next
          npm run dev &
        env:
          PORT: 3000
          HOST: 127.0.0.1

      - name: Wait for server
        run: |
          for i in {1..45}; do
            if curl -sf http://127.0.0.1:3000/ >/dev/null && \
               curl -sf http://127.0.0.1:3000/api/documents >/dev/null; then
              echo "Server ready (home + API, attempt $i)"
              exit 0
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done
          echo "Server failed to become ready"
          exit 1

      - name: API integration tests
        run: npx vitest run "tests/api-documents.test.ts" "tests/api-write-echo.test.ts"

      - name: Install Cypress binaries
        run: npx cypress install

      - name: E2E tests
        run: npm run cypress
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: Stop dev server
        if: always()
        run: |
          pkill -f "tsx.*server.ts" || true
          pkill -f next-server || true
